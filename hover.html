<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hovering effect</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        :root{
            --clr: black;
            --fs: 10px;
            --fw: 800;
            --bgc: rgb(219, 125, 125);
            --bgc1: rgb(255, 182, 182);
        }
        h1{
            color: var(--clr);
            font-family: 'Times New Roman', Times, serif;
            font-size: 40px;
            font-weight: bolder;
            text-align: center;
            margin-top: 10px;
            padding: 10px;
        }
        .container{
            display: flex;
            align-items: center;
            justify-content: space-around;
            width: 400px;
            height: 200px;
            background-color: var(--bgc1);
            border-radius: 8px;
            border: 1px solid var(--bgc1);
        }

        .container button{
            width: 90px;
            height: 30px;
            background-color: rgb(255, 255, 255);
            border: 1px solid rgb(250, 214, 255);
            border-radius: 8px;
        }
        button:hover{
            width: 90px;
            height: 30px;
            background-color: rgb(246, 181, 255);
            border: 1px solid rgb(0, 0, 0);
            border-radius: 8px;           
        }

    </style>
</head>
<body>
    <h1>The Represtaion Of Hovering Effect</h1>
    <div class="container">
     <form action="#">
        <button class="btn1">Click</button>
        <button class="btn2">Click1</button>
        <button class="btn3">Click2</button>
        <button class="btn4">Click3</button>
     </form>

    </div>
</body>
</html>
