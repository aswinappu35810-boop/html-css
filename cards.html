<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="cards.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>card</title>
</head>
<body>
    <div class="container">
        <div class="container1">
            <div class="orange-line"></div>
            <div class="cards1">
                <img class image1 src="room.avif" alt="image">
                <div class="active1">
                    <div class="dot"></div>
                    <p>Active</p>
                </div>
                <div class="circle">

                    <div class="circle1"><img src="link.svg" alt="link"></div>
                    <div class="circle2"><img src="like.svg" alt="like"></div>
                </div>
                <!-- column -->
                <div class="container-content">
                    <!-- row -->
                    <div class="kerraloft">
                        <p class="text">Karra Loft</p>
                        <p class="text1">canada, vancouver</p>
                    </div>
                    <div class="property-price">
                        <p class="text">Property Price</p>
                        <p class="text1">$300,00</p>
                    </div>
                    <div class="bedrooms">
                        <p class="text">Bedrooms</p>
                        <p class="text1">3</p>
                    </div>
                    <div class="bathrooms">
                        <p class="text">Bathrooms</p>
                        <p class="text1">2</p>
                    </div>
                    <div class="square">
                        <p class="text">Square</p>
                        <p class="text1">352 M<sup>2</sup></p>
                    </div>
                    <div class="parking">
                        <p class="text">Parking spot</p>
                        <p class="text1">1</p>
                    </div>
                    <!-- column -->
                    <div class="three-box">
                        <!-- column -->
                            <div class="tokenprice">
                                <p>Token Price</p>
                                <h3>$50</h3>
                            </div>
                            <div class="line"></div>
                            <div class="projected-irr">
                                <p>Projected IRR</p>
                                <h3>26.3%</h3>
                            </div>
                            <div class="line"></div>
                            <div class="projecte">
                                <p>Projecte APR</p>
                                <h3>16.3%</h3>
                            </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="container2">
            <div class="green-line"></div>
            <div class="cards2">
                <img class image1 src="room.avif" alt="image">
                <div class="active2">
                    <div class="dot"></div>
                    <p>Active</p>
                </div>
                <div class="round">

                    <div class="round1"><img src="link.svg" alt="link"></div>
                    <div class="round2"><img src="like.svg" alt="like"></div>
                </div>
                <!-- column -->
                <div class="container-content2">
                    <!-- row -->
                     <div class="box1">
                        <div class="kerraloft1">
                            <h3>Karra Loft</h3>
                            <p>Canada, Vancouver</p>
                        </div>
                        <div class="property-price2">
                            <p>Property Price</p>
                            <h3>$300,00</h3>
                        </div>
                     </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
