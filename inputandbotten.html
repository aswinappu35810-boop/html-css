<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .fname{
            width: 200px;
            height: 50px;
            background-color: rgb(0, 0, 0);
            color: rgb(255, 255, 255);
            font-weight: 800;
            border: 1px solid rgb(82, 82, 82);
            border-radius:18px;
            margin-bottom: 20px;
            padding-left: 10px;
        }
        #name{
            width: 150px;
            height: 50px;
            background-color: rgb(0, 0, 0);
            color: rgb(255, 255, 255);
            border-radius: 18px;
            border: 1px solid rgb(95, 95, 95);
            padding: right 20px;;
        }

    </style>
</head>
<body>
    <input type="text" class="fname" placeholder="Enter full name">
    <button type="submit" id="name">Submit</button>
</body>
</html>
