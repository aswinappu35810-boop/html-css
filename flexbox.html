<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex basic</title>
    <style>
        *{
            margin:0;
            padding: 0;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        .container{
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: blue;
            width: 100%;
            height: 500px;
        }
        .container-links{
            display: flex;
            gap: 30px;
        }
        .links{
            display: flex;
            padding-top: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>hello1</h1>
    <h1>hello2</h1>
    <h1>hello3</h1>
    <div class="container-links">
        <h2>aswin</h2>
        <h2>shifas</h2>
        <h2>anas</h2>
        <div class="links">
            <p>hello</p>
            <p>world</p>
        </div>
    </div>
</div> 
</body>
</html>
