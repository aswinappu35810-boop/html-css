<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home</title>
    <style>
        :root{
            --bgcolorheader: rgb(195, 246, 251);
            --bgcolorcontent: rgb(147, 147, 255);
            --ff: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        *{
            margin: 0;
            padding:0;
        }
        .navbar{
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            width: 100%;
            height: 50px;
            background-color: var(--bgcolorheader);
            padding-top: 20px;
            font-family: var(--ff);
        }
        .container{
            width: 100%;
            height: 800px;
            font-family: var(--ff);
            background-color: var(--bgcolorcontent);
        }

        .container h1{
            font-weight: bolder;
            font-size: 50px;
            color: rgba(240, 248, 255, 0.285);
        }
        .container p{
            font-weight: 500;
            font-size: 50px;
            color: rgba(240, 248, 255, 0.285);
        }


    </style>
</head>
<body>
    <div class="navbar">
        <h3>PROFILE</h3>
        <p style="color: gray;">HOME</p>
        <p style="color: gray;">ABOUT</p>
        <p style="color: gray;">CONTACT</p>
        <!-- icon -->

    </div>
    <div class="container">
        <h1>HOME PAGE</h1>
        <p>Welcome to our page</p>
    </div>
</body>
</html>
