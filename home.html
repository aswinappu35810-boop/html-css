<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home</title>
    <style>
        :root{
            --bgcolorheader: #B4ACAB;
            --bgcolorcontent: rgb(147, 147, 255);
            --ff: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        *{
            margin: 0;
            padding:0;
        }
        .navbar{
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            width: 100%;
            height: 50px;
            background-color: var(--bgcolorheader);
            padding-top: 20px;
            font-family: var(--ff);
        }
        .header{
            color: #824C59;
            cursor: pointer;
            transition: 0.3s;
        }
        .header:hover{
            color: black;
            transform: scale(1.2);
        }
        .navbar i{
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
            color: #824C59;
        }
        .navbar i:hover{
            color:black ;
            transform: scale(1.2);
        }
        .container{
            position:relative;
            width: 100%;
            height: 800px;
            font-family: var(--ff);
            background-color: var(--bgcolorcontent);
        }
        .container img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .container h1{
            font-weight: bolder;
            font-size: 50px;

        }
        .container p{
            font-weight: 500;
            font-size: 50px;

        }
        .content{
            position: absolute;
            top: 11%;
            left: 20px;
            color: rgba(0, 0, 0, 0.392);
        }



    </style>
</head>
<body>
    <div class="navbar">
        <h3 class="header">PROFILE</h3>
        <p class="header">HOME</p>
        <p class="header">ABOUT</p>
        <p class="header">CONTACT</p>
        <!-- icon -->
        <i class="fa-brands fa-github"></i>   <!-- GitHub -->
    </div>
    <div class="container">
        <img src="anya-chernykh-QTmfD42FrDg-unsplash.jpg" alt="background image">
        <div class="content">
            <h1>HOME PAGE</h1>
            <p>Welcome to our page</p>
        </div>
    </div>
</body>
</html>
