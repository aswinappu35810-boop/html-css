<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home</title>
    <style>
        :root{
            --bgcolorheader: #B4ACAB;
            --bgcolorcontent: rgb(147, 147, 255);
            --ff: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        *{
            margin: 0;
            padding:0;
        }
        .navbar{
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            width: 100%;
            height: 50px;
            background-color: var(--bgcolorheader);
            padding-top: 20px;
            font-family: var(--ff);
        }
        .container{
            position:relative;
            width: 100%;
            height: 800px;
            font-family: var(--ff);
            background-color: var(--bgcolorcontent);
        }
        .container img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .container h1{
            font-weight: bolder;
            font-size: 50px;

        }
        .container p{
            font-weight: 500;
            font-size: 50px;

        }
        .content{
            position: absolute;
            top: 11%;
            left: 20px;
            color: rgba(0, 0, 0, 0.392);
        }



    </style>
</head>
<body>
    <div class="navbar">
        <h3>PROFILE</h3>
        <p style="color: #824C59;">HOME</p>
        <p style="color: #824C59;">ABOUT</p>
        <p style="color: #824C59;">CONTACT</p>
        <!-- icon -->

    </div>
    <div class="container">
        <img src="anya-chernykh-QTmfD42FrDg-unsplash.jpg" alt="background image">
        <div class="content">
            <h1>HOME PAGE</h1>
            <p>Welcome to our page</p>
        </div>
    </div>
</body>
</html>
